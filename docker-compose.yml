services:
  db:
    container_name: store-manager-db
    image: postgres:14
    environment:
      POSTGRES_DB: store_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  api:
    container_name: store-manager-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    
    # defining environment variables for the API service
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: store_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      SECRET_KEY: dxz48Rf1H9F0kYaN
    
    depends_on:
      - db
    restart: always

volumes:
  pgdata:
